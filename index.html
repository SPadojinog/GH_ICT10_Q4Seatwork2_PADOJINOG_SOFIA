<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seatwork#2</title>

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chango&family=Chewy&family=Sour+Gummy:wght@400..700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Sour Gummy", cursive, sans-serif;
            background-image: url(https://i.pinimg.com/1200x/89/7d/63/897d6330c13666cb81f99e269e4baaaa.jpg);
            background-position: center;
            background-attachment: fixed;
            margin: 0;
        }

        nav {
            background: #660B05;
            padding: 15px;
            text-align: center;
            color: white;
            font-family: "Chango", cursive;
            letter-spacing: 1px;
        }

        .banner {
            background: linear-gradient(135deg, #A31D1D, #7B1414);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-radius: 0 0 25px 25px;
            margin-bottom: 30px;
        }

        .banner h1 {
            font-family: "Chewy", cursive;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 25px;
            padding: 35px;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
        }

        .menu-card h3 {
            font-family: "Chewy", cursive;
            color: #A31D1D;
        }

        .divider {
            border-top: 2px dashed #A31D1D;
            margin: 20px 0;
        }

        label {
            margin-top: 5px;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 10px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #A31D1D;
            box-shadow: 0 0 5px rgba(163, 29, 29, 0.4);
        }

        button {
            border-radius: 25px !important;
            transition: 0.3s;
        }

        button:hover {
            background-color: #C62828 !important;
            transform: scale(1.03);
        }

        #output {
            background: #fff4f4;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: left;
            min-height: 80px;
            line-height: 1.6;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #660B05;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
    </style>
</head>

<body>

    <!-- NAVIGATION BAR -->
    <nav>
        <h3>Seatwork#2</h3>
    </nav>

    <!-- BANNER -->
    <div class="banner">
        <h1>Grade 10 Classmates System</h1>
        <p>Add and view your classmates easily!</p>
    </div>

    <!-- STUDENT INFORMATION -->
    <div class="container">
        <div class="col-md-6 mx-auto">
            <div class="menu-card">

                <h3 class="text-center">Student Information</h3>
                    <label class="fw-bold">Name</label>
                    <input type="text" id="name" class="form-control mb-3" placeholder="Enter your full name">

                    <div class="row">
                
                        <div class="col-md-6">
                            <label class="fw-bold">Section</label>
                            <select id="section" class="form-control mb-3">
                                <option value="">Select Section</option>
                                <option value="Emerald">Emerald</option>
                                <option value="Sapphire">Sapphire</option>
                                <option value="Ruby">Ruby</option>
                                <option value="Topaz">Topaz</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="fw-bold">Favorite Subject</label>
                            <select id="favsubject" class="form-control mb-3">
                                <option value="">Select Subject</option>
                                <option value="English">English</option>
                                <option value="Filipino">Filipino</option>
                                <option value="Science">Science</option>
                                <option value="Math">Math</option>
                                <option value="Social Studies">Social Studies</option>
                                <option value="Special Subjects">Special Subjects</option>
                            </select>
                        </div>
                    </div>

                <div class="d-flex justify-content-between mt-3">
                    <button class="btn btn-danger w-100 fw-bold py-2" py-click="add_classmate"> Add Classmate </button>
                    <button class="btn btn-danger w-100 fw-bold py-2" py-click="show_list"> Show List </button>
                </div>

                <div class="divider"></div>

                <!-- LIST OF CLASSMATES -->
                <div id="output"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>SOFIA LAURENCE F. PADOJINOG | 10 - SAPPHIRE</p>
    </footer>

    <py-script src="main.py"></py-script>

</body>
</html>
